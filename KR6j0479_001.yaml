body:
  text: 金剛智麼迦多聞寶藏吽迦陀野神妙修真言瑜伽念誦儀軌𮥟漫荼羅品第一爾時多聞寶藏吽迦陀王告一切衆生言我守護佛法僧為覆護三界衆生又為南閻浮提五濁惡世若出家比丘僧比丘尼僧若在家優婆塞優婆夷等守護有大陀羅尼法並大縛一切惡偈呪名曰根本普通真言如意寶珠真言大禁縛大祕密真言成萬事真言大禁縛吽迦陀野相應忿怒偈呪有善男子善女人乃至畜生等聞是真言等名字又我名字歸依此法誦持真言密印法生生世世不蒙一切災難病患不生諸惡國不生墮十八地獄苦不相無量怨敵常值遇善友善知識修行佛道得無量福德自在修得阿耨多羅三藐三菩提是故多聞王為一切衆生說普禮法彼印金剛合掌彼普禮真言曰唵迦陀一吽那迪二合尼二娑婆訶次自身懺悔印左右手作內縛拳左右風各一立左以右風本付右風著左風下本自上七遍許放登即淨三業也是明曰唵曩謨三滿多馱喃二唵三嚩多麼馱多曩四伽溜𭤶野吽五引即由是印明諸三業不淨悉皆除得諸佛智惠海即禪波羅蜜意次即結聖者吽迦陀野入三昧耶護身印即是精進波羅蜜具足彼印二手合掌二水並入掌中叉二火未相柱二風二火背相付鉤形無去二地並立二空入內並立辟除結界並印五處其五所者額右肩次左肩次心次喉即印引頂上被散當心即念此印大火聚相即觀羅字真言曰曩謨三滿多冒馱南一唵二救娑蘭二合二一唵四吠室羅麼那野五唵六俱七𮥟八毗曳二合地梨二合智九吽支智盧十娑婆賀引依此密印法身口意業所有一切惡業重罪誹謗佛法僧大乘經典同一闡提罪依此印明故悉除又一切臭穢所是依明法所有不淨悉滅除得清淨事業瑜伽即念是吽迦陀野一面十手大密藏智大生印若此印明一度結被則生生世世無量生不墮惡所常值諸佛法僧聞法得究竟果次可結成萬事相應心印二手二大入內二風作寶形二空真並臥風未付即印五處念於頂上吽之字彼隨心明曰唵支智一盧二娑婆賀引次念此真言印力一切毗那夜迦等不祥人不近來即是一切如來大智印是三法即此法三部三昧耶也初自身淨真言即法藏印次火光印明諸天密語藏即當僧伽耶次隨心印語則此一切佛藏然即行者身得金剛身念加持香水真言曰吽尾訖梨跢一都那伽多僧尼吽二合三度縛颯颯四吽五吽發吒半音取杵加持散捨水明曰吽一吽二吽三吽四次可誦大禁結請向壇堅縛不祥偈曰唵縛日羅二合一揭羅陀那多𮗇耶夜二南無毗娑麼尼三修羅尾普四麼陀羅耶五引社羅六同麼賀薩埵耶七引唬侶入引阿羅入引達麼尼八引唵九引入麼尼麼尼引㗭哆引入入入入引婆耶十引𭝲多羅入十一引麼賀十二迦羅耶十三引㗭陀入吽陀羅耶十四入唵治瑟吒婆耶十五唵十六引拔悉多引唬陀耶十七引入曩謨十八引其土其州其國其寺比丘比丘尼在家等某甲至心勸請三世十方一切諸佛菩薩諸明王聲聞緣覺諸賢聖衆等上居地居諸護法護世四王十二天等四方四角諸神王一切鬼王等諸夜叉大將衆不捨本誓來入道場證明知見諸修法事是故我比丘比丘尼僧付等至心請向禮曩謨東方各領四悉多唬多耶曩謨八大曼陀羅界會衆曩謨東方各領八萬四千鬼神王南方各領八萬四千鬼神王西方各領八萬四千鬼神王北方各領八萬四千鬼神王中央各領八萬四千鬼神王大神各領八萬四千鬼神王衆等曩謨東方單陀利道斷南方單多梨道斷西方單埵梨道斷北方單荼里道斷中央單多里道斷大神單陀利道斷曩謨東方迦羅迦羅南方迦羅迦羅西方迦羅迦羅北方迦羅迦羅中央迦羅迦羅大神迦羅迦羅曩謨東方那吒鬼神王南方那吒鬼神王西方那吒鬼神王北方那吒鬼神王中央那吒鬼神王大神那吒鬼神王十方各立四方亦復如是曩謨護法聖衆摩醯首羅知足天二十八宿主護毗沙門天王四大天王衆天三十三天四分天知足天樂變化天他化自在天梵衆天梵善益天大梵天小光天無量光天極光天小淨天遍淨天無量淨天自在天無憂天無煩天無熱天福生天廣果天善見天善現天色究竟天無邊空處天無邊色處天無所有處天非想非非想處天二十八天主護毗沙門天王三界覆護者堅牢地主正了知大將迦利底女五百眷屬金剛密跡寶賢大將僧真儞耶藥叉大將南無三十三天禪那莫鬼及緊那羅王阿耨達龍王沙竭羅王阿修羅王迦樓羅王大辨天神及大功德天如是上首諸天神等釋提桓因及日月天閻摩羅王風水諸神違馱天神及毗紐天大辨天神及自在天大神等大力勇猛大鬼神王那羅延天等諸鬼神等散指為首百千鬼神摩尼拔陀大鬼神王富那拔陀及金剛羅迦毗羅王阿羅婆帝賓頭盧伽黃頭天神一一諸神各有五百眷屬鬼神質多斯那阿修羅王及乾闥婆那羅羅闍根那娑金色髮神王半祈鬼神及半支羅主雨大神大飲食神摩訶伽吒車鉢羅婆有大威德婆那利神曇摩跢羅摩竭娑羅針髮鬼神繡梨密多勒那翅者摩訶婆及軍陀遮鐱摩舍帝復有大神奢羅密帝醯摩拔陀薩多踦梨南無娜那多陀耶曩謨日單捶拔遊羅㗭哆婆那唵拔長引曩無金剛童子一字頂龍王梨車毗童子及五億八千眷屬其名曰師子光童子師子惠童子授法授童子因陀羅童子大光童子大猛童子佛護童子法護童子僧護童子金剛護童子虛空護童子虛空吼童子寶藏童子吉祥妙藏童子南無十羅剎女等一切使者大將等至心堅縛天神堅縛地神堅縛四方四角神等堅縛明神等堅縛大神堅縛小神堅縛惡神堅縛一切惡靈堅縛一切怨敵惡人等堅縛惡人決定調伏堅縛堅縛唵拔逝羅堅縛婆四保侶保盧娑耶娑婆訶長引浪音出引印即金剛拳各膝上置瞋目四方見若有誦持此偈呪是人消滅百八煩惱及六十二見得無量福德自在所以者何此真言諸佛所稱歎從此真言中我心法此大陀羅尼偈調伏諸惡事若誦此偈時可念諸大惡物毗那夜迦諸大惡鬼神王衆外道天地四方魔鬼衆國內大小神等皆悉禁縛攝行者心內若一遍誦音頻引瞋音降伏音誦了即念吽字羅字缺字灑淨真言曰唵第誐增伽二合引野吽一索縛伽引佉若欲此法修先當可擇求佛前塔前僧房若河邊林下蘭若又心所愛樂無難所是為上悉地是所行修真言者當可令出髑髏死骨瓦石等惡苦穢物然後行者至淨所取淨土作壇曼陀羅等而後修真言法若取土時佛部以真言加持然後取土作用壇其壇扇底迦圓補瑟微迦法四角阿毗遮嚕迦法八角各八肘作又作五三肘加持作壇地真言曰唵難馱難馱一娜智娜智難達婆里薩嚩賀引若有受持真言法作壇時先誦此真言一百八遍地加持及一切蟲蟻諸類皆移避他所其得即清淨即用作壇處了作大法八大曼陀羅其名曰一因曼陀羅界二法入曼陀羅界三入相曼陀羅界四入藏曼陀羅界五妙藏曼陀羅界六證入曼陀羅界七圓法曼陀羅界八相應曼陀羅界也是名八大曼陀羅界即是八大曼陀羅一一其釋名因曼荼羅者即種子曼陀羅也法入曼陀羅即大壇三種有爐壇入相曼陀羅即行者護摩時心念其尊體相並瞋目念佛位體即觀念曼陀羅也入藏曼陀羅者即吉祥天等其眷屬部類位列相也即吉祥天女王並九人天女衆云也妙藏世界即曼陀羅也是諸尊悉皆是界來集定其本位列座成就所修法行者此界相明明了了人名阿闍梨於此界不了了人不名阿闍梨即此界成就世界即此界名傳法輪壇證入界即都鉢等諸夜叉大將軍座所也圓法世界即毗沙門王及二天𭞉怒相應八牙天等也相應世界即大日如來釋迦四千不動尊觀音彌勒菩薩等也是名八大曼陀羅行者先可視八大世界先其相如法又作如是曼陀羅了次心觀圓法世界先中主毗沙門天身著七寶金剛莊嚴鉀胄其左手捧塔右執三叉戟其腳下踏三夜叉鬼中主名地天又名歡喜天左右名使女左名尼藍婆女天右名毗藍婆神王三鬼相面好相體左右女天其相好令具又座下五大子有各將軍體鉀胄被手各持弓箭並有又五行道天女有又被鉀胄面體女相滿作又手持鎌刀又其天有又被甲胄瞋面手執刀鎌各皆座石坐是名十人大將衆吉祥天圓滿好相諸衣服莊嚴無比天女左手持青蓮華右手施手無畏相頂五寶莊嚴相目毗沙門王愛相細姣面白少赤相蓮葉居九人女衆又好相世無比等吉祥天各手持寶刀又將鉾又持鏡各三人持物也各蓮葉居又八牙相者背立面色赤衣色黑目各面三若半三目若半二目牙上方指自下方長白牙袖脅下牙各臆當指一處手下方合掌一所手上方合掌下方合掌持獨股上方合掌持金剛𮣣圓座上居頭天王方胄相女髮登返垂相也各面甚可怖畏相見人可𨶌惑九人長衆皆長牙各甲胄被面相怖畏也各蓮葉居上方牙短下方牙長從座過各手弓箭持多聞主中央吉祥王北方八牙王南方各使天衆東方即主王天等座下西方東北角大自在天次帝釋天次火天即老夫相身相赤次並自在天閻魔天次羅剝天次水天次並梵天次地天次並風天日天次月天次魔訶迦羅天王合十二天皆石座居被甲胄手各持獨鈷刀但除火天王手持水瓶次手持竹杖身火繞相是即名入藏曼陀羅並圓法曼陀羅行者是世界佛位明了視智乃至作造曼陀羅如是先毗沙門王身印先二手合掌風水二指指掌中入地火空指各立並五所天上四方結界即念是依印加持故一切障難者毗那夜迦等惡鬼神悉皆走却不能害行者人一切所求成就即成多聞智惠身體彼明妃曰曩漠三曼多馱南一唵二摩唓都娑縛訶次吉祥天女印各手內縛各風指立延各方於乳上念即一切願成就乳海悉我行者從身止觀中流出一切衆生施與若為病即成善藥若為所望即成能便若為飢饉即成飲食若為貧窮人則成寶衣食若為無女無夫無使人者皆如是成一一利益即此乳海如是有相可觀彼真言曰唵一麼賀室唎二提婆毗三娑婆賀引次九人使者天女印各手內縛各風火延竪應調左右三返舞喜悅相即念我一切衆生與安樂是使者悉皆我為使人即真言曰唵一摩訶縛日羅二二提婆毗二娑婆訶次八牙天印二手內縛各風延各口從下于膝上三度引垂即念長牙相一切相應魔降伏相即明曰唵梨曳多羅吽娑婆訶次九人大將等印各作拳當心上瞋目見尊像觀曼荼羅又是九人皆此我行人童子念彼真言曰唵多賀陀迦縛日羅二合地儞二合曳娑婆訶次十二大天總印二手合掌二火牙臥五處印即真言曰曼漠三滿多冒馱南一唵二伊闍陀羅野三阿誐閻四地利智曳五縛嚕多野婆吠六婆毗利智七阿儞二合野敬多羅野八唵摩賀引迦羅曳九娑婆訶十觀想應曼荼羅界即行者住清淨法界中念大日如來即頂五寶冠被種種瓔珞莊嚴面相圓滿好相作定印大蓮華王座次南方彌勒菩薩手持獨鈷並三鈷寶冠瓔珞莊嚴好相具足妙蓮華座次南方四手不動尊色紺髮垂水波甚可怖畏相正手右持鍊𮣣左持索次左手持蓮華次右手持寶珠須彌座火光繞身三十二相具足忿怒相無比次北方釋迦牟尼佛頂烏瑟相法衣繞身說法印相新現三十二相八十種好相具足妙蓮花王座次又北方觀世音菩薩寶冠莊嚴寶瓔珞現前左手持蓮華右手持如意寶珠青蓮華座乃至造作又如是先大日如來智印次真言是相應界總印金剛金合掌頂上被衣各方散念一切如來被甲胄真言印彼明曰唵縛日羅二二哆賀吽多羅多二娑婆訶引次觀證入曼𭱻羅世界中央主都鉢主多聞天王彌王上居山下三夜叉鬼