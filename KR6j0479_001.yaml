味利益有情然即多聞王如彼大林又字如同彼大樹林是一字即行者欲修真言心王時即生大樹林次於置心王中其一字即念則生好青五色葉次修真言者住心王阿娑頗那伽三昧無動念八大道場時即生好相具足希有花次行人修真言供養諸尊及大王時又生果之實又次行者至心其意八大漫荼羅運通達誦真言王欲所修法成就無他念思彼尊相體自心王城現住時即所生果實生就而後行者發廣大無比大慈三昧一切衆生利益所生功德回施法界衆生其罪苦煩惱障斷除念三時即成甘味施隨法界衆生一一其所生所罪至一一利益安樂即此字誦本尊天王行人前現形其人語云我從隨行人心無所疑念即毗沙門天王體相種子相也彼五口點即佛法僧護持相也是即天王本三昧耶其心堅固從中出是五佛又彼五佛即利益衆生故顯天王堅固心中而行人如是字相了知如法觀智成就此大心王法是二字即種子曼陀羅云即行者觀能此法字梨字即此成就種子曼陀羅了又蓮華金剛各加大點即得意字心如同俱彼點等漂蓮華金剛相也𮥟字即如大山諸大小河江海出此𮥟之法入漫陀羅大事相部母種子𮥟字即大吉祥女體相也即念𮥟字天女王現立承事法之師即是𮥟字中出又一法即是護摩法也一向𮥟字供養相應法也即是二字合為曼陀羅部母真言即從是二字中出是大密法即行者口唱𮥟二合一遍即得如是本誓一一成就圓滿事故名曼陀羅母真言若欲供養是曼荼羅先設供養具始誓行者先至心善聞持未來有情可傳授先欲修法時先可備供養相應物於淨室中瞿摩夷塗地作大壇相應壇場並又用金木土葉螺等器隨時飲食時果子時花香油燈蘇煎餅乳粥等酪蘇蜜𩚈捻頭子團種種甘味團粥采種種物團時草采時美並小頭等餅飯諸甘果種種和合作藥種種香味歡喜丸如法清淨至心供養常燒妙香諸名香所謂安息旃檀龍腦蘇合多揭羅薰陸松香等也皆等也皆等分和合一所香爐等可燒即又以真言等白線又五色線加持之可身繫是糸諸事業必成就先又敬禮三寶及多聞伽陀野王所行法其中間念此依功德力能施令諸衆生一切所願成就如是念禮了作法香烟令不絶誦前母呪等晝夜繫念勿令他解爾時多聞王有子名禪膩師現童子來至其所問言何故喚我父即報言我為三寶供養供養為一切願故請也時其童子聞了即還本宮白父言今有善人發誠心三寶供養滿一切所願諸念事請其父報子言汝速可至彼所言汝曰曰與一百迦利沙波拏若滿十陳那羅其持呪者見是相已知可得成就當獨處淨室燒香三寶供養行法念一切貧者令得寶物於諸有情起慈悲念勿生瞋恚誑諂害之心若起少瞋心即失大神驗常護心勿瞋恚若持此呪法人於每日中憶我及男女眷屬讚歎恆以十善相助彼諸天等福力增光明普令證無上菩提而彼天等見是事已皆大歡喜共來擁護持呪者又壽命長遠經無量歲永離三塗苦無災難死又令得如意寶珠及以伏藏神通自在所願皆成若求官榮無不成亦解一切禽獸之語已說曼荼羅供養法竟次又可說𬿘曼陀羅法印吽迦陀野摩訶主布解梵字品第二示現三動惡魔三天身梵字根本真言曰唵毗地瑟陀𭇎㗭者沙𭇎延命梵本真言曰唵梵毗地瑟秫陀娑𭇎悲生梵本真言曰唵梵毗地瑟地𭇎㗭地𭇎㗭沙𭇎爾時大日薄伽梵言未來世衆生早欲成就悉地先從阿闍梨以應受梵字雖行餘法不知此法悉地難成就所以者何是三世諸佛肝心也是釋迦牟尼如來二瞳一切聖人之命多聞王福德藏一切衆生依報若有衆生不知三世諸佛肝心而何得成佛道若有衆生閉釋迦之瞳何可被釋迦護若有衆生殺一切聖人之命滅福德藏閉諸尊瞳當何得出地獄若何得福德何得智惠之因早欲成就世間出世間願者當受持梵本真言梵字是三世佛肝心故令受持一切衆生是三種梵本真言三合二十八字行者當得梵本意偈曰諸衆生身興一佛身是故諸佛以此大願說法時為根本種子延命偈曰三世諸佛以不殺戒是故是教有智行者來世衆生可傳是戒悲生偈曰一切諸佛諸衆生等與忍施法當此教人可行是心是偈等彼梵本真言心中心乃至三聚淨意又如是此故行者以此偈心為觀智根本此偈功盡劫不能說是偈是橫竪無限意任行者心又吉觀世音菩薩言汝順衆生機為可說法若有來世衆生修多聞迦野王之法者即為延佛法壽命若不持者為斷佛法僧寶之壽命若欲受持人每日清旦合掌一心誦母明千遍即滅無始生死以來無量重罪生生世世常遇諸佛之世滅罪業故若可墮六道依此功德不墮六道化他故變化六道受持一遍其功德尚多何況曉夜三時一心精進若行是法者先當根本大呪十萬遍誦先多聞迦陀野根本大陀羅尼曰曩謨三滿多菩馱南一阿他佉嚕菩怛羅耶三毗舍那藥叉吠賒羅跋那闍耶四麼迦瞿羅闍耶五夜叉地婆哩婆麼哩耶六薩都哩耶婆賒耶七鉢囉婆訶娜耶八喜摩泮鉢囉娑耶九唵十多娑抳始曬毗娑羅麼娜耶十一麼賀引曷囉闍耶十二佉唎羯伽哆囉耶十三唵唓都耶十四唵摩唓都十五娑嚩賀引曉夜三時之中每時誦一千遍若二十一遍而母𭒄怒真言等念誦當行者已灌頂阿闍梨所受法印即受灌頂位又欲受法先勤修精進見好相亦可試神驗若無好相亦更懺悔得好相又得神驗竟然後受法若不灌頂受法無功德若隨阿闍梨得受法即受灌頂位即若不得印信不得灌頂位此相等不具足不得傳授若不受得灌頂位不名阿闍梨以但心意為本曼陀羅若此盡果階業心意不相似真言行人佛子行事即此滅大神驗是難密印真言現世悉皆滅盡而行者得此等之意受法傳授若有受法弟子出來擇其意行者心相威儀若欲成就世出世悉地隨願應作方圓等壇種種設供具作法三日五日七日九日十四日二十一日三十日九十日百日可為一期穢處勿行間靜之處如法念誦勿以攀緣若發攀緣從境觀行息災本尊曼陀羅向南西行者為東北面降伏向尊東北行人向南西又蹲踞若為結跏趺座敬愛等諸行法如息災作若欲修法先當作金剛𭬸即形如獨鈷杵本如鉾末杵形即以大界加持金剛𭬸真言等加持其作橛金剛木等真言行者至信心作法印又說摩訶多聞王心中大極密語行者當可此偈句持即偈曰假使有日月從空墮於地或大地傾覆設有如是事持明此必成不應少生疑除恚心行人此法易成就不假於持戒利益貧窮人一切人恭敬乃至壽命盡加陀王加持遠離諸厄難藥叉將護持當隨受持者若能持是法諸法悉成就迅疾如箭射諸王恭敬是所求皆成辦必得無盡寶千俱胝夜叉守護持明者能滿諸大願解脫諸惡趣即梵本真言明曰曩謨三滿多一縛日羅二合赦唵三阿婆羅耶四婆哆般捨儞耶五陀娑𭇎六唵跋折羅二合婆儞多毗使者七娑縛迦引行者當可渴身支分先作寶印二手合掌於頂上諸支分令遍彼初二十八字誦即彼二十八字真言則此我身瓔珞次當結天王梵本密語被甲印即作金剛合掌心上於置念即此行人為身甲胄相也彼偈意悉解知用此梵本明若欲無生忍者觀七真言梵字光明自閉目念有一金輪繞匝而現七種光明一青如青琉璃二黃如沙金三赤如火挍塊四白如銀五紅如頗梨六青黃共合如瑪瑙七青白和合如車渠如是光明從自口出入本尊口即亦出入自頂中如此相續一切衆生身悉入出即閉目口誦三部母真言七真言一字二𬿘字三二十八字真言四天王梵本明妃五大禁縛偈明六如意寶珠明七供養會真言等云七種光明真言行者得此意即明了觀智已說梵字相了次說護摩扇底迦法𮑱瑟徵迦法阿毗遮盧法相應事當行者至心聞是大密相應大法聞即信受吽迦陀野一面十臂摩訶神王𮥟護摩品第三修真言行者當至心如法清淨奉持不生一切非法惡意行事若有一切衆生欲修護摩法先當結鎮護自身印法則印左右地水火內縛風立末合作寶形二空並臥付掌當口念即是一切世間諸聖衆一一護身印明我悉皆被即印五所明曰曩謨三滿多縛日羅二合赦一鉢荼羅吠二藥娑多三娑嚩賀引若入道場欲護摩時先行道先先行人可持一刀鎌彼道場作法印右手取刀左手挓腰橫行步彼時於瞋目令有嗔聲引即彼明彼母部二字真言當三種修法或用右手作刀印念大刀即明曰𮥟次天王一腳三眼印左右作刀印若用大刀若小刀末引從心上牙左右替之先作本座之大鬼神形若未若盡其鬼形入堂道間居置作呪印法生忿怒想彼鬼形踏過踰即取置草座下若座具等下自者居其上行法即就座當刀臆上誦根本呪三七遍次結界阿闍梨身印以左右手作拳地臥二水叉伏印五處真言曰唵誐誐嚩𫄅吽二合引入次大壇法印左右手作拳二大指叉臥壇中令遍明曰唵誐𧿇二合一𧿇野𫄅吽引入次大壇結印左右手作拳風指叉伏壇上放明妃曰唵誐野一弟娑吽二索縛賀引次四方上方下方結印左右手作拳空指一所合明曰唵弟誐二合引陀一吽二增婆𭇎次大智大印左右以手合十指去立打火天王之打不祥魔惡事觀知真言王曰唵嚩多寸𮮍一陀𮜈二吽三一切諸大惡魔等令降伏印法右手作大拳當意念爾所由真𮘓唵惡惹二合佉吽惡事惡相悉皆斷燒印左右手姣立並合當心於大上呪曰唵誐賀尼吽發吒引次作結法印左右水火內方臥左右地指未調合姣竪左右風如柱立去左右母指並放安壇中真言𮘮曩謨參漫多嚩娑囉二合難一詮陀娜𫄅吽二合引爾時多聞王利益衆生猶無力諸大惡魔神等不能降伏即入阿娑波那伽三昧作是念云我更無力大惡魔降伏即得一切如來同力三昧智降伏王體相其成體王即得一切如來金剛身無礙智一切智聚無量福德藏緊固法界王三昧即此以般若智為莊嚴三昧也智惠火繞身般若智力鎌成手持相以般若為瓔珞以智慧鏡為眼以伏藏為座右大惡魔鬼王為座持者以慈悲為體身以忿怒為面相以降伏想為手以智慧火為髮相用利益有情心為眉三水波相以一切衆生其災患燒盡惡障除無量惡魔鬼神等降伏從隨事為其下方指三寸牙相何故牙白有三寸之相經三世一切衆生其過惡業障災難怖畏生死輪回若觀是生界與無量淨身三昧相也一切惡人於佛法僧生惡事亦放逸沙彌童男童女悉降伏又不持戒比丘比丘尼等皆降伏諸不信者伏悉令歸依三寶故如是以心為兩足袈裟色青是何相一切衆生若干大願滿足相即檀波羅密相初青物後必成黃依此念又地輪之相漂識衣色黑紺一切衆生諸惡障礙不祥悉除相衣風輪王漂相身色皆赤一切有情令得明鏡開惠眼並又一切衆生為照諸暗事故皆如是相為色相又大天王心以師子迅疾力諸佛同心三昧也金剛心為大王意一切衆生善惡事業皆聞知是念即以為耳相又諸佛如來一切智慧般若智火悉皆以為其大火光相以般若智心為寶塔以般若道理為金剛𮣣相以諸甘味藥為素以諸滅不淨成淨所是心為箭相以般若威光為弓相以般若妙說肝心為獨鈷以一切衆生所作惡事佛法僧誹謗諸一切衆生罪業皆悉除令聞諸佛授記音故是想為金剛鈴相以一切魔障惡事悉皆辟除令無餘故是相為金剛鉾相以一乘教利為一面之想以四無量心為四大天體像亦是王以十二印為大智藏心眼以此印為金剛身體若有行人持是十二印即現身得自在他心智得無量自在身先般若心為其依具即一面十手根本大火光降伏災難無所不至大陀羅尼曰曩謨三滿多嚩日羅赦一陀賀二𫏂地𠼝䓾泄三佉佉四缺訖哩二合五唵六𮥟二合七毗曳𧿇知哩智陀賀八跛師𮟎盧九吽發吒索縛迦引大母心真言王曰𮥟摩訶王心中心呪曰唵迦陀野吽索縛賀引是三種真言說了即時三千大千世界六種震動是時大子等大驚曰是何因緣即王曰我出世間事但只有一大因緣也
